<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F0F4FF; --surface: #FFFFFF; --surface2: #F8FAFF;
  --ink: #0F172A; --ink-muted: #64748B; --ink-faint: #94A3B8;
  --accent: #4F46E5; --accent2: #7C3AED; --accent-light: #EEF2FF;
  --green: #059669; --green-light: #D1FAE5;
  --border: #E2E8F0; --radius: 20px; --radius-sm: 12px;
  --shadow: 0 2px 8px rgba(15,23,42,0.06), 0 8px 32px rgba(15,23,42,0.08);
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'Sora', sans-serif; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(79,70,229,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(124,58,237,0.08) 0%, transparent 60%);
}
.header { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 16px 36px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Sora', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--ink); letter-spacing: -0.03em; display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.85rem; box-shadow: 0 2px 8px rgba(79,70,229,0.35); }
.logo span { color: var(--accent); }
.header-login { font-family: 'Sora', sans-serif; font-size: 0.82rem; font-weight: 600; color: var(--accent); text-decoration: none; padding: 7px 18px; border: 1.5px solid rgba(79,70,229,0.3); border-radius: 8px; background: var(--accent-light); transition: background 0.15s; }
.header-login:hover { background: #e0e7ff; border-color: var(--accent); }
.main { max-width: 680px; margin: 0 auto; padding: 64px 24px 100px; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--ink-muted); text-decoration: none; margin-bottom: 40px; transition: color 0.15s; }
.back-link:hover { color: var(--accent); }
.post-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.post-tag { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; background: var(--accent-light); color: var(--accent); padding: 4px 10px; border-radius: 20px; }
.post-date { font-size: 0.78rem; color: var(--ink-faint); }
.post-title { font-family: 'Lora', serif; font-size: clamp(1.7rem, 4vw, 2.4rem); font-weight: 600; color: var(--ink); line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 20px; }
.post-lede { font-size: 1.05rem; color: var(--ink-muted); line-height: 1.75; margin-bottom: 40px; padding-bottom: 40px; border-bottom: 1px solid var(--border); }
.post-body { font-size: 0.95rem; line-height: 1.85; color: var(--ink); }
.post-body h2 { font-family: 'Lora', serif; font-size: 1.3rem; font-weight: 600; color: var(--ink); margin: 44px 0 16px; letter-spacing: -0.01em; }
.post-body p { margin-bottom: 20px; color: var(--ink-muted); }
.post-body p strong { color: var(--ink); font-weight: 600; }
.post-body ul { margin: 0 0 20px 20px; color: var(--ink-muted); }
.post-body ul li { margin-bottom: 8px; line-height: 1.7; }
.callout { background: var(--accent-light); border-left: 3px solid var(--accent); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 18px 22px; margin: 32px 0; font-size: 0.9rem; color: var(--ink); line-height: 1.7; }
.post-footer { margin-top: 56px; padding-top: 32px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.post-footer-label { font-size: 0.8rem; color: var(--ink-faint); }
.btn-export { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-family: 'Sora', sans-serif; font-size: 0.85rem; font-weight: 600; border-radius: var(--radius-sm); text-decoration: none; box-shadow: 0 4px 14px rgba(79,70,229,0.3); transition: opacity 0.2s; }
.btn-export:hover { opacity: 0.9; }
.site-footer { border-top: 1px solid var(--border); padding: 32px 36px; margin-top: 48px; background: var(--surface); }
.site-footer-inner { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
.footer-nav { display: flex; flex-wrap: wrap; gap: 8px 24px; align-items: center; }
.footer-nav-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); width: 100%; margin-bottom: 4px; }
.footer-nav a { font-size: 0.8rem; color: var(--ink-muted); text-decoration: none; transition: color 0.15s; }
.footer-nav a:hover { color: var(--accent); }
.footer-nav-divider { color: var(--border); font-size: 0.8rem; }
.footer-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; padding-top: 16px; border-top: 1px solid var(--border); }
.footer-copy { font-size: 0.75rem; color: var(--ink-faint); }
.footer-legal { display: flex; gap: 16px; flex-wrap: wrap; }
.footer-legal a { font-size: 0.75rem; color: var(--ink-faint); text-decoration: none; }
.footer-legal a:hover { color: var(--accent); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
.main { animation: fadeUp 0.6s ease both; }
@media (max-width: 600px) { .header { padding: 14px 20px; } .main { padding: 40px 16px 80px; } }
</style>

</main>

<!--FOOTER-->

<!--
=== CHECKLIST FOR EACH NEW POST ===
Replace all %% placeholders before deploying:

%%POST_TITLE%%      → Full post title (used in <title>, OG, Twitter, h1, schema)
%%META_DESCRIPTION%%→ 150 char max description (used in meta, OG, Twitter, schema)
%%SLUG%%            → URL slug e.g. why-copilot-silently-cuts-off-your-code
%%DATE_ISO%%        → ISO date e.g. 2026-05-28 (used in schema)
%%DATE_DISPLAY%%    → Human date e.g. May 28, 2026 (shown on page)
%%TAG%%             → Category e.g. AI Tools, Developer Tools, Privacy, AI Comparison
%%LEDE%%            → Opening paragraph (1-2 sentences, hooks the reader)
%%SECTION_X_HEADING%%  → h2 subheading
%%SECTION_X_BODY%%     → Paragraph(s) of content
%%CALLOUT_LABEL%%   → Bold callout intro e.g. "The frustrating part:"
%%CALLOUT_TEXT%%    → Callout body text

Also add a card for this post in /pages/blog/index.html
-->
