     stacked list of every post title. It is NOT the main blog index (index.html),
     which keeps its card layout. This page is a fast-scanning alternative view.
     Fill in <ul class="all-posts-list"> with one <li><a> per post, newest first. -->

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F0F4FF; --surface: #FFFFFF; --surface2: #F8FAFF;
  --ink: #0F172A; --ink-muted: #64748B; --ink-faint: #94A3B8;
  --accent: #4F46E5; --accent2: #7C3AED; --accent-light: #EEF2FF;
  --border: #E2E8F0; --radius: 20px; --radius-sm: 12px;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'Sora', sans-serif; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.header { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 16px 36px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Sora', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--ink); letter-spacing: -0.03em; display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.85rem; box-shadow: 0 2px 8px rgba(79,70,229,0.35); }
.logo span { color: var(--accent); }
.header-login { font-family: 'Sora', sans-serif; font-size: 0.82rem; font-weight: 600; color: var(--accent); text-decoration: none; padding: 7px 18px; border: 1.5px solid rgba(79,70,229,0.3); border-radius: 8px; background: var(--accent-light); transition: background 0.15s; }
.header-login:hover { background: #e0e7ff; border-color: var(--accent); }
.main { max-width: 680px; margin: 0 auto; padding: 64px 24px 100px; }
.post-nav { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; row-gap: 8px; }
.post-nav-top { margin-bottom: 40px; }
.post-nav-bottom { margin-top: 40px; padding-top: 28px; border-top: 1px solid var(--border); }
.post-nav a { display: inline-flex; align-items: center; gap: 6px; font-size: 0.92rem; font-weight: 600; color: var(--ink-muted); text-decoration: none; padding: 12px 14px; border-radius: var(--radius-sm); white-space: nowrap; transition: color 0.15s, background 0.15s; }
.post-nav a:hover { color: var(--accent); background: var(--accent-light); }
.post-nav a:first-child { padding-left: 0; }
.post-nav a:last-child { padding-right: 0; justify-content: flex-end; }
.archive-title { font-family: 'Lora', serif; font-size: clamp(1.6rem, 4vw, 2.1rem); font-weight: 600; color: var(--ink); letter-spacing: -0.02em; margin-bottom: 28px; }
.all-posts-list { list-style: none; border-top: 1px solid var(--border); }
.all-posts-list li { border-bottom: 1px solid var(--border); }
.all-posts-list a { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; padding: 14px 2px; text-decoration: none; color: var(--ink); font-size: 1rem; font-weight: 500; line-height: 1.4; transition: color 0.15s; }
.all-posts-list a:hover { color: var(--accent); }
.all-posts-date { flex: none; font-size: 0.78rem; font-weight: 400; color: var(--ink-faint); white-space: nowrap; }
@media (max-width: 600px) {
  .header { padding: 14px 20px; }
  .main { padding: 40px 16px 80px; }
  .post-nav a { padding: 12px 8px; font-size: 0.88rem; }
  .all-posts-list a { font-size: 0.95rem; flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>
<body>

<!--HEADER-->

<main class="main">

  <nav class="post-nav post-nav-top">
    <a href="/pages/blog/">← The Export</a>
    <a href="/pages/blog/all-posts/">All Posts</a>
    <a href="#">Older Posts →</a>
  </nav>

  <h1 class="archive-title">All Posts</h1>

  <ul class="all-posts-list">
    <!-- One <li> per post, newest first. Copy this block for each entry: -->
    <li><a href="/pages/blog/POST-SLUG/"><span>Post Title Goes Here</span><span class="all-posts-date">Mon D, YYYY</span></a></li>
  </ul>

  <nav class="post-nav post-nav-bottom">
    <a href="/pages/blog/">← The Export</a>
    <a href="/pages/blog/all-posts/">All Posts</a>
    <a href="#">Older Posts →</a>
  </nav>

</main>

<!--FOOTER-->

<script data-goatcounter="https://notavello.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script></body>
