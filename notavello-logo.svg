<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Icon: document with fold -->
  <rect x="0" y="4" width="36" height="40" rx="7" ry="7" fill="url(#logoGrad)"/>
  <!-- Fold triangle -->
  <polygon points="22,4 36,18 22,18" fill="rgba(255,255,255,0.25)"/>
  <!-- Lines on document -->
  <rect x="8" y="24" width="14" height="2.5" rx="1.25" fill="rgba(255,255,255,0.9)"/>
  <rect x="8" y="30" width="20" height="2.5" rx="1.25" fill="rgba(255,255,255,0.7)"/>
  <rect x="8" y="36" width="11" height="2.5" rx="1.25" fill="rgba(255,255,255,0.5)"/>
  <!-- Wordmark -->
  <text x="46" y="32" font-family="'Sora', 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="-0.5" fill="#0F172A">Nota<tspan fill="#4F46E5">vello</tspan></text>
</svg>
