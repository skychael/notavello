              MINOR=$(echo $CURRENT | sed 's/perplexity-//' | cut -d. -f2)
              NEWMINOR=$((MINOR + 1))
              NEW="perplexity-${MAJOR}.${NEWMINOR}"
              TIMESTAMP=$(date -u '+%H:%M:%S UTC')
