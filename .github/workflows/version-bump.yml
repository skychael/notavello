            if [ -n "$CURRENT" ]; then
              MAJOR=$(echo $CURRENT | sed 's/copilot-//' | cut -d. -f1)
              MINOR=$(echo $CURRENT | sed 's/copilot-//' | cut -d. -f2)
              NEWMINOR=$((MINOR + 1))
              NEW="copilot-${MAJOR}.${NEWMINOR}"
              TIMESTAMP=$(date -u '+%H:%M:%S UTC')
              sed -i "s/${CURRENT}/${NEW}/g" "$FILE"
