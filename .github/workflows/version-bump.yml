      - name: Bump exporters/copilot/index.html version
        if: contains(github.event.head_commit.modified, 'exporters/copilot/index.html') || contains(github.event.head_commit.added, 'exporters/copilot/index.html')
        run: |
          FILE="exporters/copilot/index.html"
          if [ -f "$FILE" ]; then
