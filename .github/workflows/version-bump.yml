      - name: Bump exporters/grok/index.html version
        if: contains(github.event.head_commit.modified, 'exporters/grok/index.html') || contains(github.event.head_commit.added, 'exporters/grok/index.html')
        run: |
          FILE="exporters/grok/index.html"
          if [ -f "$FILE" ]; then
            CURRENT=$(grep -o 'grok-[0-9]*\.[0-9]*' "$FILE" | head -1)
            if [ -n "$CURRENT" ]; then
              MAJOR=$(echo $CURRENT | sed 's/grok-//' | cut -d. -f1)
              MINOR=$(echo $CURRENT | sed 's/grok-//' | cut -d. -f2)
              NEWMINOR=$((MINOR + 1))
              NEW="grok-${MAJOR}.${NEWMINOR}"
              TIMESTAMP=$(date -u '+%H:%M:%S UTC')
