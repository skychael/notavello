      - name: Bump exporters/other/index.html version
        if: contains(github.event.head_commit.modified, 'exporters/other/index.html') || contains(github.event.head_commit.added, 'exporters/other/index.html')
        run: |
          FILE="exporters/other/index.html"
          if [ -f "$FILE" ]; then
            CURRENT=$(grep -o 'other-[0-9]*\.[0-9]*' "$FILE" | head -1)
            if [ -n "$CURRENT" ]; then
              MAJOR=$(echo $CURRENT | sed 's/other-//' | cut -d. -f1)
              MINOR=$(echo $CURRENT | sed 's/other-//' | cut -d. -f2)
              NEWMINOR=$((MINOR + 1))
              NEW="other-${MAJOR}.${NEWMINOR}"
              TIMESTAMP=$(date -u '+%H:%M:%S UTC')
              sed -i "s/${CURRENT}/${NEW}/g" "$FILE"
              sed -i "s/generated [0-9]*:[0-9]*:[0-9]* UTC/generated ${TIMESTAMP}/g" "$FILE"
              echo "Bumped other: $CURRENT → $NEW"
              echo "OTHER_BUMPED=true" >> $GITHUB_ENV
              echo "OTHER_VERSION=$NEW" >> $GITHUB_ENV
            fi
          fi

      - name: Commit bumped versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes to commit" && exit 0
          git add index.html exporters/claude/index.html exporters/chatgpt/index.html exporters/gemini/index.html exporters/perplexity/index.html exporters/grok/index.html exporters/copilot/index.html exporters/other/index.html
          MSG="[version-bump]"
          [ -n "$ROOT_VERSION" ] && MSG="$MSG root→$ROOT_VERSION"
          [ -n "$CLAUDE_VERSION" ] && MSG="$MSG claude→$CLAUDE_VERSION"
          [ -n "$CHATGPT_VERSION" ] && MSG="$MSG chatgpt→$CHATGPT_VERSION"
          [ -n "$GEMINI_VERSION" ] && MSG="$MSG gemini→$GEMINI_VERSION"
          [ -n "$PERPLEXITY_VERSION" ] && MSG="$MSG perplexity→$PERPLEXITY_VERSION"
          [ -n "$GROK_VERSION" ] && MSG="$MSG grok→$GROK_VERSION"
          [ -n "$COPILOT_VERSION" ] && MSG="$MSG copilot→$COPILOT_VERSION"
          [ -n "$OTHER_VERSION" ] && MSG="$MSG other→$OTHER_VERSION"
          git commit -m "$MSG"
          git push
