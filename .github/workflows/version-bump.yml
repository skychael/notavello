          FILE="exporters/gemini/index.html"
          if [ -f "$FILE" ]; then
            CURRENT=$(grep -o 'gemini-[0-9]*\.[0-9]*' "$FILE" | head -1)
            if [ -n "$CURRENT" ]; then
              MAJOR=$(echo $CURRENT | sed 's/gemini-//' | cut -d. -f1)
              MINOR=$(echo $CURRENT | sed 's/gemini-//' | cut -d. -f2)
              NEWMINOR=$((MINOR + 1))
              NEW="gemini-${MAJOR}.${NEWMINOR}"
