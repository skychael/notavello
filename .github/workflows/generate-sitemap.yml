name: Generate sitemap

# Runs on every push to main, EXCEPT pushes that only change sitemap.xml
# (that prevents the bot's own commit from triggering another run).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'sitemap.xml'

# The job needs write access so it can commit the regenerated sitemap back.
permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebase onto the latest main
        run: |
          git fetch origin main
          git rebase origin/main

      - name: Generate sitemap.xml
        run: |
          node .github/scripts/generate-sitemap.js
          node scripts/seo-audit.js --check

          # The audit writes timestamped reports. This workflow owns only the
          # sitemap, so discard those generated report changes before rebasing.
          git restore --worktree -- reports/seo

      - name: Commit if changed
        run: |
          # Nothing to do if the page list didn't change.
          if git diff --quiet -- sitemap.xml; then
            echo "Sitemap unchanged - nothing to commit."
            exit 0
          fi

          git config user.name  "sitemap-bot"
          git config user.email "actions@github.com"
          git add sitemap.xml
          git commit -m "Auto-update sitemap [skip ci]"

          # Safety net: if another workflow committed after our initial rebase,
          # fetch it and stack the already-committed sitemap change on top.
          # Retry a couple of times in case of a near-simultaneous push.
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push race on attempt $attempt - retrying in 5s..."
            sleep 5
          done
          echo "Could not push sitemap after 3 attempts." >&2
          exit 1
