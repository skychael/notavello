name: Inject Analytics

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  inject-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject GoatCounter snippet
        run: |
          SNIPPET='<script data-goatcounter="https://notavello.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>'
          find . -name "*.html" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            | while read file; do
              if grep -q "goatcounter" "$file"; then
                echo "Already has snippet: $file"
              else
                sed -i "s|</body>|$SNIPPET</body>|g" "$file"
                echo "Injected: $file"
              fi
            done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: inject GoatCounter analytics"
          git push
