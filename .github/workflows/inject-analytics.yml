name: Inject Analytics

# Only runs when an .html file actually changed in this push, so it doesn't
# fire (and doesn't risk racing version-bump.yml / generate-sitemap.yml) on
# commits that touch nothing but scripts, docs, or workflow files.
on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
  workflow_dispatch:

jobs:
  inject-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject GoatCounter snippet
        run: |
          SNIPPET='<script data-goatcounter="https://notavello.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>'
          find . -name "*.html" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            | while read file; do
              if grep -q "goatcounter" "$file"; then
                echo "Already has snippet: $file"
              else
                sed -i "s|</body>|$SNIPPET</body>|g" "$file"
                echo "Injected: $file"
              fi
            done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "chore: inject GoatCounter analytics"

          # Safety net: if version-bump or generate-sitemap committed at the
          # same moment, pull their change in and stack ours on top, then
          # push. Retry a couple of times in case of a near-simultaneous push.
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push race on attempt $attempt - retrying in 5s..."
            sleep 5
          done
          echo "Could not push analytics injection after 3 attempts." >&2
          exit 1
