body{background:var(--bg);font-family:Sora,sans-serif;color:var(--ink)}

<body>

<header class="header">
  <a class="logo" href="/">Notavello</a>
</header>

<main class="screen">

  <div class="hero">
    <h1>AI Writing Detector</h1>
    <p>Paste text or upload a file to analyze it.</p>
  </div>

  <div class="disclaimer">
    This tool is heuristic and not definitive.
  </div>

  <div class="card">
    <div class="card-head">
      <span>Your Text</span>
      <span id="count">0 chars</span>
    </div>

    <div class="upload">
      <input type="file" id="file" accept=".txt">
    </div>

    <textarea id="text"></textarea>

    <div class="card-foot">
      <button class="btn reset" id="reset">Reset</button>
      <button class="btn go" id="go">Analyze</button>
    </div>
  </div>

  <div id="res" class="res">
    <div id="icon" style="font-size:2.4rem;margin-bottom:10px">🤔</div>
    <h2 id="title">Needs More Text</h2>
    <p id="desc" style="color:var(--ink2);margin-bottom:20px">Paste text and analyze.</p>

    <div class="meter">
      <div class="meter-track">
        <div id="fill" class="meter-fill"></div>
      </div>
    </div>
  </div>

</main>
<script>
const t=document.getElementById("text"),
c=document.getElementById("count"),
go=document.getElementById("go"),
r=document.getElementById("reset"),
res=document.getElementById("res"),
icon=document.getElementById("icon"),
title=document.getElementById("title"),
desc=document.getElementById("desc"),
fill=document.getElementById("fill");

/* typing counter */
t.oninput=()=>c.textContent=t.value.length+" chars";

/* reset */
r.onclick=()=>{t.value="";c.textContent="0 chars";res.style.display="none"};

/* upload */
document.getElementById("file").onchange=e=>{
 let f=e.target.files[0]; if(!f)return;
 let rd=new FileReader();
 rd.onload=x=>{t.value=x.target.result;c.textContent=t.value.length+" chars"};
 rd.readAsText(f);
};

/* analyze */
go.onclick=()=>{
 let v=t.value.trim();
 if(v.length<30){title.textContent="Needs More Text";desc.textContent="Enter at least 30 characters.";res.style.display="block";return}
 let s=score(v); update(s); res.style.display="block";
};

/* scoring */
function score(v){
 let s=0;
 const low=v.toLowerCase();
 const words=v.trim().split(/\s+/);
 const wc=words.length;

 // ── 1. AI vocabulary — words statistically overrepresented in AI output ──
 const aiWords=["delve","tapestry","nuanced","comprehensive","multifaceted",
  "intricate","pivotal","crucial","paramount","groundbreaking","revolutionary",
  "transformative","leverage","utilize","facilitate","endeavor","underscore",
  "commendable","admirable","notable","noteworthy","it's worth noting",
  "it is worth noting","it's important to","it is important to",
  "in today's world","in the realm of","at the end of the day",
  "at its core","in conclusion","to summarize","in summary",
  "in this day and age","a testament to","stands as a","serves as a"];
 let aiWordHits=0;
 aiWords.forEach(w=>{if(low.includes(w))aiWordHits++});
 s+=Math.min(30, aiWordHits*6);

 // ── 2. Hedging / filler phrases common in AI ──
 const hedges=["however","moreover","furthermore","consequently","therefore",
  "additionally","nevertheless","nonetheless","in addition","on the other hand",
  "it should be noted","this is not to say","while it is true",
  "needless to say","as previously mentioned"];
 let hedgeHits=0;
 hedges.forEach(w=>{if(low.includes(w))hedgeHits++});
 s+=Math.min(20, hedgeHits*5);

 // ── 3. Structural perfection — paragraph length consistency ──
 // AI writes neat same-sized paragraphs; humans are uneven
 const paras=v.split(/\n{2,}/).map(p=>p.trim()).filter(p=>p.length>20);
 if(paras.length>=3){
  const lens=paras.map(p=>p.length);
  const mean=lens.reduce((a,b)=>a+b,0)/lens.length;
  const variance=lens.reduce((a,b)=>a+Math.pow(b-mean,2),0)/lens.length;
  const cv=Math.sqrt(variance)/mean; // coefficient of variation — low = AI-like uniformity
  if(cv<0.2)s+=20;
  else if(cv<0.4)s+=10;
 }

 // ── 4. Zero typos / informal self-corrections ──
 // Humans leave traces — "I mean", "actually", "wait", "hmm", "tbh", "lol"
 const humanTraces=["i mean","actually,","wait,","wait —","hmm","hm,",
  "tbh","lol","haha","honestly,","ok so","okay so","right?","you know",
  "like,","sort of","kind of","i think","i guess","maybe","idk","ngl"];
 let traceHits=0;
 humanTraces.forEach(w=>{if(low.includes(w))traceHits++});
 s-=Math.min(20, traceHits*5); // human traces REDUCE the score

 // ── 5. Punctuation patterns — AI loves em-dashes and semicolons ──
 const emDashes=(v.match(/—|–/g)||[]).length;
 const semis=(v.match(/;/g)||[]).length;
 if(wc>0){
  if(emDashes/wc>0.01)s+=8;
  if(semis/wc>0.008)s+=7;
 }

 // ── 6. Perfect grammar signals — no sentence fragments, no run-ons ──
 // Real humans often write short punchy fragments. AI rarely does.
 const sentences=v.split(/(?<=[.!?])\s+/).filter(x=>x.trim().length>2);
 if(sentences.length>=4){
  const shortSentences=sentences.filter(s=>s.trim().split(/\s+/).length<=4).length;
  const fragRatio=shortSentences/sentences.length;
  if(fragRatio<0.05)s+=10; // almost no short sentences = AI-like
 }

 // ── 7. Vocabulary evenness — AI uses consistent register ──
 // Measure word length variance: AI is consistent, humans vary more
 if(wc>=30){
  const wlens=words.map(w=>w.replace(/[^a-zA-Z]/g,'').length).filter(l=>l>0);
  const wMean=wlens.reduce((a,b)=>a+b,0)/wlens.length;
  const wVar=wlens.reduce((a,b)=>a+Math.pow(b-wMean,2),0)/wlens.length;
  if(wVar<5)s+=10; // very even word lengths = AI-like
 }

 // ── 8. Starts of sentences — AI rarely starts with And/But/So informally ──
 const informalStarts=(v.match(/\b(And|But|So|Because|Yet)\s/g)||[]).length;
 if(sentences.length>0 && informalStarts/sentences.length<0.02)s+=5;

 return Math.min(100,Math.max(0,Math.round(s)));
}

/* UI update */
function update(s){
 fill.style.width=s+"%";
 if(s>70){res.style.background="#FEE2E2";icon.textContent="⚠️";title.textContent="Likely AI";desc.textContent="Strong AI‑like patterns detected.";fill.style.background="var(--r)"}
 else if(s>45){res.style.background="#FEF3C7";icon.textContent="🟡";title.textContent="Possibly AI";desc.textContent="Mixed indicators detected.";fill.style.background="var(--y)"}
 else if(s>20){res.style.background="#EEF2FF";icon.textContent="🤔";title.textContent="Uncertain";desc.textContent="Inconclusive patterns.";fill.style.background="var(--a)"}
 else{res.style.background="#D1FAE5";icon.textContent="🟢";title.textContent="Likely Human";desc.textContent="Natural human‑like variation detected.";fill.style.background="var(--g)"}
}
</script>
