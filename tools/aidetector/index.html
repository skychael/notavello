<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Writing Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&family=Lora:wght@400;600&display=swap" rel="stylesheet">

<style>
*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#F0F4FF;--surface:#fff;--ink:#0F172A;--ink2:#64748B;--ink3:#94A3B8;
--a:#4F46E5;--a2:#7C3AED;--g:#059669;--y:#D97706;--r:#DC2626;
--rad:20px;--rad2:12px;--sh:0 2px 8px rgba(0,0,0,.06),0 8px 32px rgba(0,0,0,.08)
}
body{background:var(--bg);font-family:Sora,sans-serif;color:var(--ink)}
.header{background:#fffcc;border-bottom:1px solid var(--ink3);padding:16px 36px;display:flex;justify-content:space-between}
.logo{font-weight:700;color:var(--ink);text-decoration:none}
.screen{max-width:800px;margin:0 auto;padding:50px 20px}
.hero{text-align:center;margin-bottom:40px}
.hero h1{font-family:Lora,serif;font-size:2.4rem;margin-bottom:10px}
.hero p{color:var(--ink2)}
.disclaimer{background:#FEF3C7;border-left:3px solid var(--y);padding:12px 16px;border-radius:var(--rad2);margin-bottom:20px}
.card{background:#fff;border:1px solid var(--ink3);border-radius:var(--rad);box-shadow:var(--sh);margin-bottom:20px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--ink3);display:flex;justify-content:space-between}
.upload{padding:14px 20px;border-bottom:1px solid var(--ink3)}
.upload input{font-size:.9rem}
#text{width:100%;min-height:200px;padding:20px;border:none;outline:none;font-size:.9rem}
.card-foot{padding:14px 20px;border-top:1px solid var(--ink3);display:flex;gap:12px;justify-content:flex-end}
.btn{padding:10px 20px;border-radius:var(--rad2);cursor:pointer}
.reset{background:#fff;border:1px solid var(--a);color:var(--a)}
.go{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;border:none}
.res{display:none;margin-top:20px;text-align:center;padding:30px;border-radius:var(--rad);box-shadow:var(--sh)}
.res h2{font-family:Lora,serif;margin-bottom:10px}
.meter{max-width:320px;margin:0 auto}
.meter-track{height:10px;background:#ddd;border-radius:50px;overflow:hidden}
.meter-fill{height:100%;border-radius:50px;width:0;background:var(--a)}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="#">Notavello</a>
</header>

<main class="screen">

  <div class="hero">
    <h1>AI Writing Detector</h1>
    <p>Paste text or upload a file to analyze it.</p>
  </div>

  <div class="disclaimer">
    This tool is heuristic and not definitive.
  </div>

  <div class="card">
    <div class="card-head">
      <span>Your Text</span>
      <span id="count">0 chars</span>
    </div>

    <div class="upload">
      <input type="file" id="file" accept=".txt">
    </div>

    <textarea id="text"></textarea>

    <div class="card-foot">
      <button class="btn reset" id="reset">Reset</button>
      <button class="btn go" id="go">Analyze</button>
    </div>
  </div>

  <div id="res" class="res">
    <div id="icon" style="font-size:2.4rem;margin-bottom:10px">🤔</div>
    <h2 id="title">Needs More Text</h2>
    <p id="desc" style="color:var(--ink2);margin-bottom:20px">Paste text and analyze.</p>

    <div class="meter">
      <div class="meter-track">
        <div id="fill" class="meter-fill"></div>
      </div>
    </div>
  </div>

</main>
<script>
const t=document.getElementById("text"),
c=document.getElementById("count"),
go=document.getElementById("go"),
r=document.getElementById("reset"),
res=document.getElementById("res"),
icon=document.getElementById("icon"),
title=document.getElementById("title"),
desc=document.getElementById("desc"),
fill=document.getElementById("fill");

/* typing counter */
t.oninput=()=>c.textContent=t.value.length+" chars";

/* reset */
r.onclick=()=>{t.value="";c.textContent="0 chars";res.style.display="none"};

/* upload */
document.getElementById("file").onchange=e=>{
 let f=e.target.files[0]; if(!f)return;
 let rd=new FileReader();
 rd.onload=x=>{t.value=x.target.result;c.textContent=t.value.length+" chars"};
 rd.readAsText(f);
};

/* analyze */
go.onclick=()=>{
 let v=t.value.trim();
 if(v.length<30){title.textContent="Needs More Text";desc.textContent="Enter at least 30 characters.";res.style.display="block";return}
 let s=score(v); update(s); res.style.display="block";
};

/* scoring */
function score(v){
 let s=0;
 let sen=v.split(/[.!?]/).filter(x=>x.trim().length);
 let avg=sen.reduce((a,b)=>a+b.length,0)/sen.length;
 if(avg>140)s+=25; if(avg<40)s+=15;
 ["however","moreover","in addition","furthermore","consequently"].forEach(w=>{if(v.toLowerCase().includes(w))s+=10});
 let w=v.split(/\s+/),u=new Set(w).size;
 if(w.length/u>4)s+=20;
 return Math.min(100,Math.max(0,s));
}

/* UI update */
function update(s){
 fill.style.width=s+"%";
 if(s>70){res.style.background="#FEE2E2";icon.textContent="⚠️";title.textContent="Likely AI";desc.textContent="Strong AI‑like patterns detected.";fill.style.background="var(--r)"}
 else if(s>45){res.style.background="#FEF3C7";icon.textContent="🟡";title.textContent="Possibly AI";desc.textContent="Mixed indicators detected.";fill.style.background="var(--y)"}
 else if(s>20){res.style.background="#EEF2FF";icon.textContent="🤔";title.textContent="Uncertain";desc.textContent="Inconclusive patterns.";fill.style.background="var(--a)"}
 else{res.style.background="#D1FAE5";icon.textContent="🟢";title.textContent="Likely Human";desc.textContent="Natural human‑like variation detected.";fill.style.background="var(--g)"}
}
</script>

</body>
</html>
