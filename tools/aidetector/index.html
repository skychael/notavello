<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Writing Detector — Notavello</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Lora:wght@400;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F0F4FF;
  --surface: #FFFFFF;
  --surface2: #F8FAFF;
  --ink: #0F172A;
  --ink-muted: #64748B;
  --ink-faint: #94A3B8;
  --accent: #4F46E5;
  --accent2: #7C3AED;
  --accent-light: #EEF2FF;
  --green: #059669;
  --amber: #D97706;
  --red: #DC2626;
  --radius: 20px;
  --radius-sm: 12px;
  --shadow: 0 2px 8px rgba(15,23,42,0.06), 0 8px 32px rgba(15,23,42,0.08);
  --shadow-lg: 0 4px 16px rgba(79,70,229,0.12), 0 16px 48px rgba(15,23,42,0.12);
}

body {
  background: var(--bg);
  font-family: 'Sora', sans-serif;
  color: var(--ink);
  min-height: 100vh;
}

/* HEADER */
.header {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--ink-faint);
  padding: 16px 36px;
  display: flex; justify-content: space-between; align-items: center;
}
.logo { font-size: 1.25rem; font-weight: 700; text-decoration: none; color: var(--ink); }

/* MAIN */
.screen-ui { max-width: 800px; margin: 0 auto; padding: 56px 24px 100px; }

/* HERO */
.hero { text-align: center; margin-bottom: 44px; }
.hero h1 { font-family: 'Lora', serif; font-size: 2.6rem; margin-bottom: 16px; }
.hero p { color: var(--ink-muted); max-width: 480px; margin: 0 auto; }

/* DISCLAIMER */
.disclaimer {
  background: #FEF3C7;
  border-left: 3px solid var(--amber);
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  margin-bottom: 24px;
}

/* INPUT CARD */
.input-card {
  background: var(--surface);
  border: 1px solid var(--ink-faint);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.input-card-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--ink-faint);
  display: flex; justify-content: space-between;
}
#pasteArea {
  width: 100%; min-height: 200px;
  padding: 20px;
  border: none; outline: none;
  font-size: 0.9rem;
}
.input-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--ink-faint);
  display: flex; justify-content: flex-end; gap: 12px;
}
.btn-analyze {
  padding: 12px 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white; border: none; border-radius: var(--radius-sm);
}
.btn-reset {
  padding: 10px 18px;
  background: var(--surface);
  color: var(--accent);
  border: 1.5px solid rgba(79,70,229,0.35);
  border-radius: var(--radius-sm);
}

/* RESULTS SECTION */
.verdict-card {
  border-radius: var(--radius);
  padding: 32px 36px;
  margin-top: 20px;
  text-align: center;
  box-shadow: var(--shadow-lg);
}
.verdict-card.likely-ai { background: #FEE2E2; border: 1.5px solid rgba(220,38,38,0.2); }
.verdict-card.possibly-ai { background: #FEF3C7; border: 1.5px solid rgba(217,119,6,0.25); }
.verdict-card.likely-human { background: #D1FAE5; border: 1.5px solid rgba(5,150,105,0.2); }
.verdict-card.uncertain { background: #EEF2FF; border: 1.5px solid rgba(79,70,229,0.2); }

.verdict-icon { font-size: 2.8rem; margin-bottom: 12px; }
.verdict-title { font-family: 'Lora', serif; font-size: 1.6rem; margin-bottom: 10px; }
.verdict-desc { color: var(--ink-muted); margin-bottom: 20px; }

.score-meter-wrap { max-width: 340px; margin: 0 auto; }
.score-meter-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--ink-faint); }
.score-meter-track { height: 10px; background: rgba(15,23,42,0.08); border-radius: 100px; overflow: hidden; }
.score-meter-fill { height: 100%; border-radius: 100px; }
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="#">Notavello</a>
</header>

<main class="screen-ui">

  <div class="hero">
    <h1>AI Writing Detector</h1>
    <p>Paste text below and analyze how human‑like or AI‑like it appears.</p>
  </div>

  <div class="disclaimer">
    This tool is heuristic and not definitive. Results are estimates only.
  </div>

  <div class="input-card">
    <div class="input-card-header">
      <span class="input-label">Your Text</span>
      <span id="charCount">0 chars</span>
    </div>

    <textarea id="pasteArea"></textarea>

    <div class="input-footer">
      <button class="btn-reset" id="resetBtn">Reset</button>
      <button class="btn-analyze" id="analyzeBtn">Analyze</button>
    </div>
  </div>

  <section id="resultsSection" style="display:none;">
    <div id="verdictCard" class="verdict-card uncertain">
      <div id="verdictIcon" class="verdict-icon">🤔</div>
      <div id="verdictTitle" class="verdict-title">Needs More Text</div>
      <p id="verdictDesc" class="verdict-desc">Paste text and click Analyze.</p>

      <div class="score-meter-wrap">
        <div class="score-meter-label">
          <span>Human‑like</span><span>AI‑like</span>
        </div>
        <div class="score-meter-track">
          <div id="scoreFill" class="score-meter-fill" style="width:0%; background:var(--accent);"></div>
        </div>
      </div>
    </div>
  </section>

</main>

<footer style="text-align:center; padding:40px 0; color:var(--ink-faint); font-size:0.8rem;">
  © 2026 Notavello — AI Tools
</footer>

<script>
const pasteArea = document.getElementById("pasteArea");
const charCount = document.getElementById("charCount");
const analyzeBtn = document.getElementById("analyzeBtn");
const resetBtn = document.getElementById("resetBtn");
const resultsSection = document.getElementById("resultsSection");
const verdictCard = document.getElementById("verdictCard");
const verdictIcon = document.getElementById("verdictIcon");
const verdictTitle = document.getElementById("verdictTitle");
const verdictDesc = document.getElementById("verdictDesc");
const scoreFill = document.getElementById("scoreFill");

pasteArea.addEventListener("input", () => {
  charCount.textContent = pasteArea.value.length + " chars";
});

resetBtn.addEventListener("click", () => {
  pasteArea.value = "";
  charCount.textContent = "0 chars";
  resultsSection.style.display = "none";
});

analyzeBtn.addEventListener("click", () => {
  const text = pasteArea.value.trim();
  if (text.length < 30) {
    verdictTitle.textContent = "Needs More Text";
    verdictDesc.textContent = "Enter at least 30 characters.";
    resultsSection.style.display = "block";
    return;
  }

  const score = calculateAIScore(text);
  updateUI(score);
  resultsSection.style.display = "block";
});

function calculateAIScore(text) {
  let score = 0;

  const sentences = text.split(/[.!?]/).filter(s => s.trim().length > 0);
  const avgSentence = sentences.reduce((a,b)=>a+b.length,0) / sentences.length;
  if (avgSentence > 140) score += 25;
  if (avgSentence < 40) score += 15;

  const transitions = ["however","moreover","in addition","furthermore","consequently"];
  transitions.forEach(t => { if (text.toLowerCase().includes(t)) score += 10; });

  const words = text.split(/\s+/);
  const unique = new Set(words).size;
  if (words.length / unique > 4) score += 20;

  return Math.min(100, Math.max(0, score));
}

function updateUI(score) {
  scoreFill.style.width = score + "%";

  if (score > 70) {
    verdictCard.className = "verdict-card likely-ai";
    verdictIcon.textContent = "⚠️";
    verdictTitle.textContent = "Likely AI";
    verdictDesc.textContent = "Strong AI‑like patterns detected.";
    scoreFill.style.background = "var(--red)";
  } else if (score > 45) {
    verdictCard.className = "verdict-card possibly-ai";
    verdictIcon.textContent = "🟡";
    verdictTitle.textContent = "Possibly AI";
    verdictDesc.textContent = "Mixed indicators detected.";
    scoreFill.style.background = "var(--amber)";
  } else if (score > 20) {
    verdictCard.className = "verdict-card uncertain";
    verdictIcon.textContent = "🤔";
    verdictTitle.textContent = "Uncertain";
    verdictDesc.textContent = "Inconclusive patterns.";
    scoreFill.style.background = "var(--accent)";
  } else {
    verdictCard.className = "verdict-card likely-human";
    verdictIcon.textContent = "🟢";
    verdictTitle.textContent = "Likely Human";
    verdictDesc.textContent = "Natural human‑like variation detected.";
    scoreFill.style.background = "var(--green)";
  }
}
</script>

</body>
</html>
