<!-- Notavello email logo block — paste into Worker email HTML -->
<!-- Uses inline styles only (email-client safe). No web fonts. -->
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:32px;">
  <tr>
    <td align="center">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <!-- Icon box -->
          <td style="background:linear-gradient(135deg,#4F46E5,#7C3AED);border-radius:10px;width:36px;height:36px;text-align:center;vertical-align:middle;padding:0;">
            <img src="https://notavello.com/email-icon.png" width="20" height="20" alt="" style="display:block;margin:8px auto;" onerror="this.style.display='none'"/>
            <!-- Fallback text if image fails -->
            <span style="font-family:Arial,sans-serif;font-size:16px;color:white;font-weight:bold;display:none;">N</span>
          </td>
          <!-- Wordmark -->
          <td style="padding-left:10px;vertical-align:middle;">
            <span style="font-family:Arial,'Helvetica Neue',sans-serif;font-size:20px;font-weight:700;color:#0F172A;letter-spacing:-0.5px;">Nota<span style="color:#4F46E5;">vello</span></span>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
